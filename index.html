<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>XML Tool</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠️</text></svg>">
    <link rel="stylesheet" data-name="vs/editor/editor.main" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/editor/editor.main.min.css">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs/loader.min.js"></script>
</head>
<body>
    <div class="top-menu">
        <div class="menu-items">
            <button id="menu-decoder" class="menu-item active" onclick="switchTab('decoder')">XML Decoder</button>
            <button id="menu-formatter" class="menu-item" onclick="switchTab('formatter')">Formatter</button>
            <button id="menu-diff" class="menu-item" onclick="switchTab('diff')">Diff</button>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    </div>
    
    <div class="container">
        <div id="decoder-tab" class="tab-content active">
        <div class="history-section" id="history-section" style="display:none;">
            <div style="flex:1; position:relative; display:flex; align-items:center;">
                <input type="text" id="history-input" placeholder="-- Decoded History --" autocomplete="off" onfocus="showHistoryList()" oninput="filterHistory()" style="padding-right:70px;">
                <span id="history-clear" onclick="clearHistoryInput()" style="display:none; position:absolute; right:52px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:14px; color:#999; padding:2px 4px;">✕</span>
                <span id="history-save-label" onclick="saveHistoryLabel()" style="display:none; position:absolute; right:30px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:14px; color:#28a745; padding:2px 4px;">💾</span>
                <span id="history-delete" onclick="deleteHistoryEntry()" style="display:none; position:absolute; right:8px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:14px; color:#dc3545; padding:2px 4px;">🗑</span>
                <div id="history-list" class="history-list"></div>
            </div>
            <button onclick="clearHistory()">Clear History</button>
        </div>
        <div class="editor-label">Input XML:</div>
        <div id="input-editor" class="editor-container"></div>
        
        <div class="button-group">
            <div>
                <button onclick="decodeBase64()">Decode Counterparts</button>
                <button onclick="clearAll()">Clear</button>
            </div>
            <div>
                <button class="load-btn" onclick="loadXML()">Load</button>
                <button class="save-btn" onclick="saveXML()">Save Input</button>
            </div>
        </div>
        
        <div id="counterpart-buttons" class="counterpart-buttons"></div>
        <div id="sub-buttons-container" style="display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #e0e0e0;">
            <div id="output-title" class="output-title" style="margin-top: 0;"></div>
            <div id="sub-buttons" class="counterpart-buttons" style="margin-top: 0; padding-top: 0; border-top: none;"></div>
        </div>
        <div id="exclusion-options" style="display: none; margin: 15px 0; padding: 10px; background: #f8f9fa; border-radius: 6px; border: 1px solid #e0e0e0;">
            <label style="margin-right: 20px; display: inline-flex; align-items: center; cursor: pointer;">
                <input type="checkbox" id="excludeSignature" style="margin-right: 6px; cursor: pointer;">
                <span style="font-size: 14px; font-weight: 500;">Remove Signatures</span>
            </label>
            <label style="display: inline-flex; align-items: center; cursor: pointer;">
                <input type="checkbox" id="excludeRenderedData" style="margin-right: 6px; cursor: pointer;">
                <span style="font-size: 14px; font-weight: 500;">Exclude RenderedData</span>
            </label>
        </div>
        <div class="editor-label" id="output-label" style="display: none;">Output:</div>
        <div id="output-editor" class="editor-container" style="display: none;"></div>
        <div id="output-actions" class="output-actions">
            <button class="copy-btn" onclick="copyToClipboard(this)">Copy to Clipboard</button>
            <button class="save-counterpart-btn" onclick="saveCounterpart()">Save Output</button>
        </div>
        </div>
        
        <div id="formatter-tab" class="tab-content">
            <div class="controls">
                <button onclick="formatCode()">Format</button>
                <button onclick="clearFormatter()">Clear</button>
            </div>
            <div id="formatter-editor" class="editor-container"></div>
        </div>

        <div id="diff-tab" class="tab-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <button class="load-btn" style="color: white;" onclick="loadDiffFile('original')">Load Original</button>
                <div class="controls" style="margin: 0;">
                    <button onclick="swapDiffEditors()">Swap</button>
                    <button onclick="formatDiff()">Format</button>
                    <button onclick="clearDiff()">Clear</button>
                </div>
                <button class="load-btn" style="color: white;" onclick="loadDiffFile('modified')">Load Modified</button>
            </div>
            <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                <span class="editor-label" style="flex: 1;">Original</span>
                <span class="editor-label" style="flex: 1; text-align: right;">Modified</span>
            </div>
            <div id="diff-editor-container" class="editor-container" style="height: 700px;"></div>
        </div>
    </div>

    <script src="file-utils.js"></script>
    <script src="transform-utils.js"></script>
    <script src="history.js"></script>
    <script src="decoder.js"></script>
    <script src="app.js"></script>
</body>
</html>
